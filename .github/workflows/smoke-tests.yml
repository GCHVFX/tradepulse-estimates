name: Smoke tests

# There's no existing CI in this repo. Pushes to main go through Vercel's
# GitHub App integration, which already creates a GitHub Deployment and
# fires deployment_status events (confirmed via the linked Vercel project)
# for every push, succeeded or failed, preview or production. Reacting to
# that event is more reliable than sleeping a fixed amount of time after
# push and hoping the build finished by then.
#
# We deliberately don't use github.event.deployment_status.target_url: it's
# the immutable per-deployment URL, which Vercel's Standard Protection
# (enabled by default on projects with a custom production domain) blocks at
# the edge for anyone without a Vercel SSO session — every request 401s
# before it reaches the app. trytradepulse.com is the aliased custom domain
# and is public. Once deployment_status reports success for Production, the
# alias has already been repointed, so there's no timing gap from hardcoding it.
on:
  deployment_status:

jobs:
  smoke:
    if: github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run test:smoke
        env:
          PLAYWRIGHT_BASE_URL: https://trytradepulse.com
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
